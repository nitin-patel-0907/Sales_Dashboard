<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Sales Dashboard</title>
</head>
<body>

    <h1>International Sales Dashboard</h1>

    <hr>

    <!-- Date Filter -->
    <section>
        <h2>Filter</h2>

        <form>
            <label for="fromDate">From Date:</label>
            <input type="date" id="fromDate" name="fromDate">

            <br><br>

            <label for="toDate">To Date:</label>
            <input type="date" id="toDate" name="toDate">

            <br><br>

            <button type="submit">Apply Filter</button>
            <button type="reset">Reset</button>
        </form>
    </section>

    <hr>

    <!-- Target vs Actual Sales -->
    <section>
        <h2>Target vs Actual Sales</h2>

        <div id="targetActualChart">
            <!-- Target vs Actual Sales Chart -->
        </div>
    </section>

    <hr>

    <!-- Monthly Revenue -->
    <section>
        <h2>Monthly Revenue</h2>

        <div id="monthlyRevenueChart">
            <!-- Monthly Revenue Chart -->
        </div>
    </section>

</body>
</html>
